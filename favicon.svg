<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 200" fill="none">
  <defs>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6600"/>
      <stop offset="60%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="200" fill="#FDFAF6"/>

  <!-- Logo group: centered (logo is 226×44, scale ~4x → 452×88, offset x=30 y=56) -->
  <g transform="translate(30, 56) scale(2)">
    <!-- Speech bubble body -->
    <rect x="0" y="0" width="40" height="35" rx="9" fill="url(#bubbleGrad)"/>
    <rect x="0" y="0" width="40" height="35" rx="9" fill="url(#shineGrad)"/>
    <path d="M9 35 L10 44 L20 35 Z" fill="url(#bubbleGrad)"/>
    <!-- T letter -->
    <rect x="5.5" y="9" width="29" height="6.5" rx="3.25" fill="white"/>
    <rect x="17.25" y="15.5" width="5.5" height="15" rx="2.75" fill="white"/>
    <!-- Wordmark -->
    <text x="51" y="31"
      font-family="'Plus Jakarta Sans', Arial Black, system-ui, sans-serif"
      font-size="24"
      font-weight="800"
      letter-spacing="-0.6">
      <tspan fill="#FF5200">T</tspan><tspan fill="#1F1F1F">exerra</tspan>
    </text>
  </g>
</svg>
